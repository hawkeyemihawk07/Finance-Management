{% extends 'transactions/base.html' %}

{% block content %}
    <h2>Categories</h2>
    <a href="{% url 'add_category' %}" class="button">Add Category</a>
    <table>
        <thead>
            <tr>
                <th>Name</th>
                <th>Actions</th>
            </tr>
        </thead>
        <tbody>
            {% for category in categories %}
            <tr>
                <td>{{ category.name }}</td>
                <td class="actions">
                    <a href="{% url 'edit_category' category.pk %}">Edit</a>
                    <a href="{% url 'delete_category' category.pk %}" class="delete">Delete</a>
                </td>
            </tr>
            {% endfor %}
        </tbody>
    </table>
{% endblock %}
