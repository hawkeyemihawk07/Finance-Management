{% extends 'transactions/base.html' %}

{% block content %}
    <h2>Delete Recurring Transaction</h2>
    <p>Are you sure you want to delete the recurring transaction: <strong>{{ transaction.description }}</strong>?</p>
    <form method="post">
        {% csrf_token %}
        <button type="submit" class="delete">Yes, delete</button>
        <a href="{% url 'recurring_transaction_list' %}" class="button">Cancel</a>
    </form>
{% endblock %}
